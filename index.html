<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shin's Website 🚀</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
    }

    header {
      padding: 50px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2rem;
      opacity: 0.8;
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 25px;
      background: #00c6ff;
      color: black;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #0072ff;
      color: white;
    }

    .card {
      margin: 40px auto;
      padding: 20px;
      width: 300px;
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body>

  <header>
    <h1>🔥 Welcome Shin</h1>
    <p>Your domain is live 🚀</p>
    <button onclick="showMessage()">Click Me</button>
  </header>

  <div class="card">
    <h2>About Me</h2>
    <p>I build cool stuff 😎</p>
  </div>

  <script>
    function showMessage() {
      alert("🚀 Your website is working perfectly!");
    }
  </script>

</body>
</html>
